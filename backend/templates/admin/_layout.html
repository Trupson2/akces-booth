{% extends "base.html" %}

{% block content %}
<div class="flex min-h-screen">
  <aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col">
    <div class="p-5 border-b border-slate-700">
      <div class="font-black text-lg flex items-center gap-2">
        <span class="text-2xl">📸</span> Akces Booth
      </div>
      <div class="text-xs text-slate-400 mt-1">Admin Panel</div>
    </div>
    <nav class="flex-1 p-3 space-y-1 text-sm">
      <a href="{{ url_for('admin.dashboard') }}"
         class="block px-3 py-2 rounded hover:bg-slate-700">📊 Dashboard</a>
      <a href="{{ url_for('admin.events_list') }}"
         class="block px-3 py-2 rounded hover:bg-slate-700">🎬 Eventy</a>
      <a href="{{ url_for('admin.library') }}"
         class="block px-3 py-2 rounded hover:bg-slate-700">📦 Biblioteka</a>
      <a href="{{ url_for('admin.ai_generator_page') }}"
         class="block px-3 py-2 rounded hover:bg-slate-700">🤖 AI Ramki</a>
      <a href="{{ url_for('admin.publish_queue') }}"
         class="block px-3 py-2 rounded hover:bg-slate-700">📤 Do publikacji FB</a>
      <a href="{{ url_for('admin.early_access_signups') }}"
         class="block px-3 py-2 rounded hover:bg-slate-700">📬 Early access</a>
    </nav>
    <div class="p-3 border-t border-slate-700">
      <a href="{{ url_for('admin.do_logout') }}"
         class="block px-3 py-2 text-sm text-red-400 hover:bg-red-900/30 rounded">
         🚪 Wyloguj
      </a>
    </div>
  </aside>
  <main class="flex-1 p-8 overflow-auto">
    {% block admin_content %}{% endblock %}
  </main>
</div>
{% endblock %}
