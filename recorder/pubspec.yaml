name: akces_booth_recorder
description: "Akces Booth Recorder - sterownik fotobudki 360 na tablecie OnePlus"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.0
  google_fonts: ^6.2.0
  shared_preferences: ^2.2.0
  camera: ^0.11.0
  path_provider: ^2.1.0
  video_player: ^2.9.0
  permission_handler: ^11.3.0
  # WiFi client (Station communication)
  web_socket_channel: ^2.4.0
  dio: ^5.4.0
  path: ^1.9.0
  # BLE motor (YCKJNB / 360 Controller)
  flutter_blue_plus: ^1.32.0
  # FFmpeg post-processing (boomerang + slow-mo)
  ffmpeg_kit_flutter_new: ^4.1.0
  # Status baterii Recordera wysylany do Stationa (debug panel + settings).
  battery_plus: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# AKCES BOOTH FORK: lokalny fork camera_android_camerax z wlaczona
# preview/video stabilization (CameraX setPreviewStabilizationEnabled +
# setVideoStabilizationEnabled). OP13 wspiera PREVIEW_STABILIZATION
# (potwierdzone przez MainActivity CameraDiag), stock plugin tego
# nie wlacza. Patch: third_party/camera_android_camerax/android/src/main/java/
# io/flutter/plugins/camerax/{PreviewProxyApi,VideoCaptureProxyApi}.java
dependency_overrides:
  camera_android_camerax:
    path: third_party/camera_android_camerax

flutter:
  uses-material-design: true
  assets:
    - assets/music/
    - assets/fonts/
