name: akces_booth_recorder
description: "Akces Booth Recorder - sterownik fotobudki 360 na tablecie OnePlus"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.0
  google_fonts: ^6.2.0
  shared_preferences: ^2.2.0
  camera: ^0.11.0
  path_provider: ^2.1.0
  video_player: ^2.9.0
  permission_handler: ^11.3.0
  # WiFi client (Station communication)
  web_socket_channel: ^2.4.0
  dio: ^5.4.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
