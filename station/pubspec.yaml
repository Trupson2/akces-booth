name: akces_booth_station
description: "Akces Booth Station - interfejs goscia na Tab A11+."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.0
  flutter_blue_plus: ^1.32.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.0
  google_fonts: ^6.2.0
  qr_flutter: ^4.1.0
  video_player: ^2.9.0
  # WiFi / local server
  shelf: ^1.4.0
  shelf_router: ^1.1.0
  shelf_web_socket: ^2.0.0
  web_socket_channel: ^2.4.0
  network_info_plus: ^5.0.0
  path: ^1.9.0
  path_provider: ^2.1.0
  # Backend client (upload + event sync)
  dio: ^5.4.0
  # SHA-256 do hashowania PIN-u w Settings
  crypto: ^3.0.3
  # Bateria tableta (wyswietlana w Settings + debug panel)
  battery_plus: ^6.2.0
  # Ekran zawsze aktywny - Tab nie moze zgasnac podczas eventu.
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/illustrations/
    - assets/illustrations/icons/
